name: Build Custom Bootstrap

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Package name (e.g., com.agentclaw)"
        required: true
        default: "com.agentclaw"
      minimal_bootstrap:
        description: "Minimal bootstrap (exclude large packages)"
        required: false
        type: boolean
        default: false
      ssh_server:
        description: "Bundle SSH server with default password 'changeme'"
        required: false
        type: boolean
        default: false

env:
  ARCHITECTURE: aarch64
  TERMUX_TYPE: f-droid
  ENABLE_SSH: ""
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FULL_PACKAGES: "git,curl,wget,nano,tmux,htop,jq,ca-certificates,openssl-tool,openssh,screen,nodejs-lts,python,build-essential,clang,cmake,make,autoconf,automake,libtool,pkg-config,gradle,openjdk-17,binutils,gdb,unzip,p7zip,sqlite"
  MINIMAL_PACKAGES: "git,curl,wget,nano,tmux,htop,jq,ca-certificates,openssl-tool,openssh,screen"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends git patch unzip

      - name: Set CI environment
        shell: bash
        run: echo "CI=true" >> "$GITHUB_ENV"

      - name: Cache termux-packages build
        uses: actions/cache@v4
        with:
          path: |
            ~/.termux-build
            termux-packages/build
            termux-packages/output
          key: termux-${{ env.ARCHITECTURE }}-${{ hashFiles('build-termux.sh') }}
          restore-keys: termux-${{ env.ARCHITECTURE }}-

      - name: Set package name
        shell: bash
        run: echo "TERMUX_APP__PACKAGE_NAME=--name ${{ github.event.inputs.package_name }}" >> "$GITHUB_ENV"

      - name: Set packages
        id: bootstrap_type
        shell: bash
        run: |
          if [ "${{ github.event.inputs.minimal_bootstrap }}" = "true" ]; then
            echo "ADDITIONAL_PACKAGES=--add $MINIMAL_PACKAGES" >> "$GITHUB_ENV"
            echo "BOOTSTRAP_TYPE=minimal" >> "$GITHUB_OUTPUT"
          else
            echo "ADDITIONAL_PACKAGES=--add $FULL_PACKAGES" >> "$GITHUB_ENV"
            echo "BOOTSTRAP_TYPE=full" >> "$GITHUB_OUTPUT"
          fi

      - name: Set SSH server flag
        if: github.event.inputs.ssh_server == 'true'
        shell: bash
        run: echo "ENABLE_SSH=--enable-ssh-server" >> "$GITHUB_ENV"

      - name: Build Bootstrap
        shell: bash
        run: |
          ./build-termux.sh \
            $TERMUX_APP__PACKAGE_NAME \
            --architectures $ARCHITECTURE \
            --type $TERMUX_TYPE \
            $ADDITIONAL_PACKAGES \
            $ENABLE_SSH \
            --disable-terminal \
            --disable-tasker \
            --disable-float \
            --disable-widget \
            --disable-api \
            --disable-boot \
            --disable-styling \
            --disable-gui \
            --disable-x11

      - name: List built files
        id: check_files
        shell: bash
        run: |
          echo "=== Files in root directory ==="
          ls -lah *.apk *.zip 2>/dev/null || echo "No apk/zip in root"
          echo ""
          echo "=== Bootstrap zips ==="
          find . -maxdepth 3 -name "*bootstrap-*.zip" -type f 2>/dev/null || echo "No bootstrap zips found"

          BOOTSTRAP_COUNT=$(find . -maxdepth 3 -name "*bootstrap-*.zip" -type f 2>/dev/null | wc -l)
          if [ "$BOOTSTRAP_COUNT" -gt 0 ]; then
            echo "bootstrap_found=true" >> "$GITHUB_OUTPUT"
            echo "✅ Found $BOOTSTRAP_COUNT bootstrap file(s)"
          else
            echo "bootstrap_found=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ No bootstrap files found"
          fi

      - name: Verify no com.termux references
        continue-on-error: true
        shell: bash
        run: |
          for z in $(find . -maxdepth 3 -name "*bootstrap-*.zip"); do
            [ -f "$z" ] || continue
            echo "Checking: $z"
            mkdir -p "verify_$$"
            unzip -q "$z" -d "verify_$$"
            if grep -r "com\.termux" "verify_$$/" 2>/dev/null; then
              echo "⚠️ WARNING: Found com.termux references in $z"
              echo "::warning::Some bootstrap files contain com.termux references"
            else
              echo "✅ Clean: $z"
            fi
            rm -rf "verify_$$"
          done

      - name: Prepare artifacts
        id: prepare_artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          find . -maxdepth 3 -name "*bootstrap-*.zip" -exec cp {} release-artifacts/ \; 2>/dev/null || true
          find . -maxdepth 3 -name "*.apk" -exec cp {} release-artifacts/ \; 2>/dev/null || true

          echo "=== Release artifacts ==="
          ls -lah release-artifacts/ || echo "No artifacts"

          ARTIFACT_COUNT=$(ls -A release-artifacts/ 2>/dev/null | wc -l)
          echo "artifact_count=$ARTIFACT_COUNT" >> "$GITHUB_OUTPUT"
          
          if [ "$ARTIFACT_COUNT" -eq 0 ]; then
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifacts
        if: steps.prepare_artifacts.outputs.has_artifacts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ github.event.inputs.package_name }}-${{ steps.bootstrap_type.outputs.BOOTSTRAP_TYPE }}
          path: release-artifacts/*
          retention-days: 90

      - name: Create release
        if: steps.prepare_artifacts.outputs.has_artifacts == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-${{ github.event.inputs.package_name }}
          name: Bootstrap ${{ github.event.inputs.package_name }} (${{ steps.bootstrap_type.outputs.BOOTSTRAP_TYPE }})
          files: release-artifacts/*
          body: |
            ## Bootstrap for `${{ github.event.inputs.package_name }}`

            | Setting | Value |
            |---------|-------|
            | Package | `${{ github.event.inputs.package_name }}` |
            | Arch | `${{ env.ARCHITECTURE }}` |
            | Type | `${{ steps.bootstrap_type.outputs.BOOTSTRAP_TYPE }}` |
            | SSH Server | `${{ github.event.inputs.ssh_server }}` |

            **Extract to:** `/data/data/${{ github.event.inputs.package_name }}/files/`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Final status
        shell: bash
        run: |
          if [ "${{ steps.prepare_artifacts.outputs.has_artifacts }}" == "true" ]; then
            echo "✅ Build completed successfully!"
            echo "Artifacts: ${{ steps.prepare_artifacts.outputs.artifact_count }}"
          else
            echo "❌ Build failed - no artifacts were generated"
            exit 1
          fi